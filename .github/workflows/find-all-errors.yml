name: Find All LLVM19 Errors

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: macos-14

    env:
      AARCH64: 1
      CCACHE_DIR: /tmp/ccache_dir
      RUN_UNIT_TESTS: OFF
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
    
      - name: Install dependencies
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
          export HOMEBREW_NO_ENV_HINTS=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
    
          brew update
    
          brew install -f --overwrite --quiet \
            ccache \
            googletest \
            opencv@4 \
            sdl3 \
            vulkan-headers \
            vulkan-loader \
            molten-vk
    
          brew unlink --quiet \
            ffmpeg \
            fmt \
            qtbase \
            qtsvg \
            qtdeclarative \
            protobuf || true
    
      - name: Download LLVM 19
        run: |
          if [ ! -d /tmp/llvm19 ]; then
            curl -L \
              "https://drive.usercontent.google.com/download?id=1VqGI4QH4p2j0Ldg_2zDvvF_tu6qOHzqA&export=download&confirm=t" \
              -o /tmp/llvm19.tar.gz
    
            rm -rf /tmp/llvm19
            mkdir -p /tmp/llvm19
    
            tar -xzf /tmp/llvm19.tar.gz -C /tmp/llvm19
          fi
    
      - name: Setup LLVM
        run: |
          LLVM_ROOT=$(find /tmp/llvm19 -maxdepth 1 -type d -name 'LLVM-*' | head -1)
    
          rm -f "$LLVM_ROOT/lib/libc++.1.0.dylib"
          rm -f "$LLVM_ROOT/lib/libc++abi.dylib"
          rm -f "$LLVM_ROOT/lib/libunwind.1.dylib"
    
          echo "LLVM_ROOT=$LLVM_ROOT" >> "$GITHUB_ENV"
          echo "CC=$LLVM_ROOT/bin/clang" >> "$GITHUB_ENV"
          echo "CXX=$LLVM_ROOT/bin/clang++" >> "$GITHUB_ENV"
    
          echo "$LLVM_ROOT/bin" >> "$GITHUB_PATH"
    
          "$LLVM_ROOT/bin/clang" --version
          "$LLVM_ROOT/bin/clang++" --version
    
      - name: Download Qt 6.5.8
        run: |
          curl -L \
            "https://drive.usercontent.google.com/download?id=1tiGT8NU3eUkfU956kkQilYwuK2kUCnC3&export=download&confirm=t&uuid=3ad22766-0f54-48b6-bfd2-de26be6d9383" \
            -o /tmp/qt-6.5.8-arm64.tar.gz
    
          rm -rf /tmp/qt65
          tar -xzf /tmp/qt-6.5.8-arm64.tar.gz -C /tmp
    
      - name: Checkout submodules
        run: |
          git submodule update --init --depth=1 --jobs=8 \
          $(awk '/path/ && !/llvm/ && !/opencv/ && !/SDL/ && !/feralinteractive/ { print $3 }' .gitmodules)
    
      - name: Configure
        run: |
          BREW_PATH="$(brew --prefix)"
    
          export SDL3_DIR="$BREW_PATH/opt/sdl3/lib/cmake/SDL3"
    
          export Qt6_DIR=/tmp/qt65/lib/cmake/Qt6
          export Qt6CoreTools_DIR=/tmp/qt65/lib/cmake/Qt6CoreTools
          export Qt6WidgetsTools_DIR=/tmp/qt65/lib/cmake/Qt6WidgetsTools
          export Qt6DBusTools_DIR=/tmp/qt65/lib/cmake/Qt6DBusTools
    
          rm -rf build
          mkdir build
          cd build
    
          cmake .. \
            -DCMAKE_PREFIX_PATH=/tmp/qt65 \
            -DQt6_DIR="$Qt6_DIR" \
            -DQt6CoreTools_DIR="$Qt6CoreTools_DIR" \
            -DQt6WidgetsTools_DIR="$Qt6WidgetsTools_DIR" \
            -DQt6DBusTools_DIR="$Qt6DBusTools_DIR" \
            -DSDL3_DIR="$SDL3_DIR" \
            -DBUILD_RPCS3_TESTS=OFF \
            -DRUN_RPCS3_TESTS=OFF \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk macosx --show-sdk-path)" \
            -DSTATIC_LINK_LLVM=ON \
            -DUSE_SDL=ON \
            -DUSE_DISCORD_RPC=ON \
            -DUSE_AUDIOUNIT=ON \
            -DUSE_SYSTEM_FFMPEG=OFF \
            -DUSE_NATIVE_INSTRUCTIONS=OFF \
            -DUSE_PRECOMPILED_HEADERS=OFF \
            -DUSE_SYSTEM_MVK=ON \
            -DUSE_SYSTEM_SDL=ON \
            -DUSE_SYSTEM_OPENCV=ON \
            -DCMAKE_CXX_FLAGS="-ferror-limit=0 -Wno-error=return-type -Wno-return-type" \
            -G Ninja
    
      - name: Find compile flags
        run: |
          {
            echo "===== Werror=return-type ====="
            grep -R "Werror=return-type" build -n || true
    
            echo
            echo "===== return-type ====="
            grep -R "return-type" build -n || true
    
            echo
            echo "===== Werror ====="
            grep -R "Werror" build -n || true
    
            echo
            echo "===== old-style-cast ====="
            grep -R "old-style-cast" . -n || true
    
            echo
            echo "===== sign-compare ====="
            grep -R "sign-compare" . -n || true
    
            echo
            echo "===== implicit-fallthrough ====="
            grep -R "implicit-fallthrough" . -n || true
          } > werror-search.txt
    
          cat werror-search.txt
    
      - name: Scan all compile errors
        run: |
          cd build
    
          ninja -k 9999 -j 1 \
            2>&1 | tee ../full-build.log
    
          exit 0
    
      - name: Extract errors
        run: |
          grep -n "error:" full-build.log > llvm19-errors.txt || true
    
          sort -u llvm19-errors.txt > llvm19-errors-unique.txt
    
          grep -n "non-void function does not return" full-build.log \
            > return-type-errors.txt || true
    
      - name: Upload LLVM19 report
        uses: actions/upload-artifact@v4
        with:
          name: llvm19-report
          path: |
            full-build.log
            llvm19-errors.txt
            llvm19-errors-unique.txt
            return-type-errors.txt
            werror-search.txt
