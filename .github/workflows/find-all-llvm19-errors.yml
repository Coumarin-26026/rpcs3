name: LLVM19 Error Scanner

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: macos-14

    env:
      AARCH64: 1
      CCACHE_DIR: /tmp/ccache_dir

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1

          brew update

          brew install -f --overwrite --quiet \
            ccache \
            googletest \
            opencv@4 \
            sdl3 \
            vulkan-headers \
            vulkan-loader \
            molten-vk

      - name: Download LLVM 19
        run: |
          if [ ! -d /tmp/llvm19 ]; then
            curl -L \
              "https://drive.usercontent.google.com/download?id=1VqGI4QH4p2j0Ldg_2zDvvF_tu6qOHzqA&export=download&confirm=t" \
              -o /tmp/llvm19.tar.gz

            mkdir -p /tmp/llvm19
            tar -xzf /tmp/llvm19.tar.gz -C /tmp/llvm19
          fi

      - name: Download Qt
        run: |
          curl -L \
            "https://drive.usercontent.google.com/download?id=1tiGT8NU3eUkfU956kkQilYwuK2kUCnC3&export=download&confirm=t" \
            -o /tmp/qt-6.5.8-arm64.tar.gz

          rm -rf /tmp/qt65
          tar -xzf /tmp/qt-6.5.8-arm64.tar.gz -C /tmp

      - name: Configure
        run: |
          LLVM_ROOT=$(find /tmp/llvm19 -maxdepth 1 -type d -name 'LLVM-*' | head -1)

          export CC="$LLVM_ROOT/bin/clang"
          export CXX="$LLVM_ROOT/bin/clang++"
          export PATH="$LLVM_ROOT/bin:$PATH"

          git submodule update --init --depth=1 --jobs=8 \
            $(awk '/path/ && !/llvm/ && !/opencv/ && !/SDL/ && !/feralinteractive/ { print $3 }' .gitmodules)

          mkdir build
          cd build

          cmake .. \
            -DCMAKE_PREFIX_PATH=/tmp/qt65 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DSTATIC_LINK_LLVM=ON \
            -DUSE_SYSTEM_SDL=ON \
            -DUSE_SYSTEM_OPENCV=ON \
            -G Ninja

      - name: Scan All Errors
        run: |
          cd build

          ninja -k 9999 \
            2>&1 | tee ../full-build.log

          true

      - name: Extract Error List
        run: |
          grep "error:" full-build.log > llvm19-errors.txt || true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: llvm19-report
          path: |
            full-build.log
            llvm19-errors.txt
